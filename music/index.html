<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: rgba(7,28,46,0.88);
      height: 100%;
    }
    .container {
      width: 100%;
      height: 100%;
      background: rgba(7,28,46,0.88);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 75%;
      height: 90%;
      border: none;
      border-radius: 12px;
      background: rgba(7,28,46,0.88); /* Force iframe background */
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe 
      scrolling="no"
      frameborder="no"
      allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/bantsfield&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&visual=true">
    </iframe>
  </div>
</body>
</html>
